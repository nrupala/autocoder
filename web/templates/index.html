<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCoder</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #6366f1;
            --accent-light: #8b5cf6;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(99, 102, 241, 0.2);
            --success: #22c55e;
            --error: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%); 
            min-height: 100vh; 
            color: var(--text); 
        }
        .container { display: flex; flex-direction: column; min-height: 100vh; }
        
        header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo-icon { 
            width: 48px; height: 48px; 
            background: rgba(255,255,255,0.2); 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .logo h1 { color: white; font-size: 1.75rem; font-weight: 700; }
        .logo p { color: rgba(255,255,255,0.8); font-size: 0.875rem; }
        
        .status-pill {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.15);
            border-radius: 999px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        .status-dot.offline { background: var(--error); animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        main { flex: 1; display: flex; padding: 2rem; gap: 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        aside { width: 280px; display: flex; flex-direction: column; gap: 1rem; }
        .panel {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
        }
        .panel h3 { 
            color: #a5b4fc; font-size: 0.875rem; 
            font-weight: 600; text-transform: uppercase; margin-bottom: 1rem; 
        }
        
        select {
            width: 100%; padding: 0.75rem 1rem;
            background: var(--bg-primary);
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.875rem;
            cursor: pointer;
        }
        select:focus { outline: none; border-color: var(--accent); }
        
        .info-grid { margin-top: 1rem; font-size: 0.75rem; color: var(--text-muted); }
        .info-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .quick-btns { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .quick-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-primary);
            border: 1px solid #334155;
            border-radius: 999px;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover { background: #334155; color: white; border-color: var(--accent); }
        
        .chat { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
        .messages { 
            flex: 1; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 1rem; 
            max-height: 600px;
        }
        
        .msg {
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            max-width: 85%;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { 
            background: var(--accent); color: white; 
            align-self: flex-end; 
        }
        .msg.assistant { 
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            align-self: flex-start; 
        }
        .msg.error { 
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--error);
            color: #fca5a5; 
        }
        .msg pre {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
            font-size: 0.875rem;
        }
        .msg code {
            background: var(--bg-primary);
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
        }
        
        .typing { display: flex; gap: 0.25rem; padding: 1rem; }
        .typing span {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
        
        .input-area { display: flex; gap: 1rem; align-items: flex-end; }
        textarea {
            flex: 1; padding: 1rem 1.5rem;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid var(--border);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            min-height: 60px;
        }
        textarea:focus { outline: none; border-color: var(--accent); }
        textarea::placeholder { color: #64748b; }
        
        button.send {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button.send:hover:not(:disabled) { transform: translateY(-2px); }
        button.send:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .mode-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .mode-btn {
            flex: 1; padding: 0.5rem;
            background: var(--bg-primary);
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn:hover { border-color: var(--accent); }
        .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        footer { padding: 1rem 2rem; text-align: center; color: var(--text-muted); font-size: 0.875rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">A</div>
                <div>
                    <h1>AUTOCODER</h1>
                    <p>Universal AI Coding Assistant</p>
                </div>
            </div>
            <div class="status-pill">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Offline</span>
            </div>
        </header>
        
        <main>
            <aside>
                <div class="panel">
                    <h3>Model</h3>
                    <select id="modelSelect">
                        <option value="template">Template Mode</option>
                        <option value="ollama">Ollama (if available)</option>
                    </select>
                    <div class="info-grid">
                        <div class="info-row"><span>GPU:</span><span id="gpuInfo">-</span></div>
                        <div class="info-row"><span>Provider:</span><span id="providerInfo">-</span></div>
                    </div>
                </div>
                
                <div class="panel">
                    <h3>Generation Mode</h3>
                    <div class="mode-row">
                        <button class="mode-btn" data-mode="power">Power Save</button>
                        <button class="mode-btn active" data-mode="standard">Standard</button>
                        <button class="mode-btn" data-mode="performance">Performance</button>
                    </div>
                </div>
                
                <div class="panel">
                    <h3>Quick Actions</h3>
                    <div class="quick-btns">
                        <button class="quick-btn" data-action="create a Python FastAPI hello world">FastAPI</button>
                        <button class="quick-btn" data-action="implement binary search python">Algorithm</button>
                        <button class="quick-btn" data-action="write pytest tests python">Tests</button>
                        <button class="quick-btn" data-action="create dockerfile python">Docker</button>
                    </div>
                </div>
                
                <div class="panel">
                    <h3>System Info</h3>
                    <div class="info-grid" id="systemInfo"></div>
                </div>
            </aside>
            
            <div class="chat">
                <div class="messages" id="messages">
                    <div class="panel" style="text-align: center;">
                        <h3 style="margin-bottom: 1rem;">Welcome to AUTOCODER</h3>
                        <p style="color: var(--text-muted);">Describe what you want to build. Uses template-based generation when no LLM is available.</p>
                    </div>
                </div>
                
                <div class="input-area">
                    <textarea id="promptInput" placeholder="Describe what you want to build..." rows="2"></textarea>
                    <button class="send" id="sendBtn">Generate</button>
                </div>
            </div>
        </main>
        
        <footer>AutoCoder v0.1.0 | Template-based code generation</footer>
    </div>
    
    <script>
        const state = {
            messages: [],
            loading: false,
            mode: 'standard'
        };
        
        const els = {
            messages: document.getElementById('messages'),
            promptInput: document.getElementById('promptInput'),
            sendBtn: document.getElementById('sendBtn'),
            modelSelect: document.getElementById('modelSelect'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            gpuInfo: document.getElementById('gpuInfo'),
            providerInfo: document.getElementById('providerInfo'),
            systemInfo: document.getElementById('systemInfo')
        };
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatCode(content) {
            let html = escapeHtml(content);
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
                return '<pre><code>' + escapeHtml(code) + '</code></pre>';
            });
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            return html;
        }
        
        function addMessage(role, content, loading = false) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            if (loading) {
                div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
                els.messages.appendChild(div);
            } else {
                div.innerHTML = formatCode(content);
                els.messages.appendChild(div);
            }
            els.messages.scrollTop = els.messages.scrollHeight;
            return div;
        }
        
        async function sendMessage() {
            const prompt = els.promptInput.value.trim();
            if (!prompt || state.loading) return;
            
            state.loading = true;
            els.sendBtn.disabled = true;
            els.sendBtn.textContent = 'Generating...';
            
            addMessage('user', prompt);
            const loadingMsg = addMessage('assistant', '', true);
            
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: prompt, 
                        model: els.modelSelect.value,
                        mode: state.mode
                    })
                });
                const data = await res.json();
                loadingMsg.remove();
                addMessage('assistant', data.code || data.response || data.error || 'No response');
            } catch (e) {
                loadingMsg.remove();
                addMessage('error', 'Error: ' + e.message);
            }
            
            state.loading = false;
            els.sendBtn.disabled = false;
            els.sendBtn.textContent = 'Generate';
            els.promptInput.value = '';
        }
        
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const connected = data.ollama || data.local || data.provider !== 'none';
                els.statusDot.className = 'status-dot' + (connected ? '' : ' offline');
                els.statusText.textContent = connected ? 'Connected' : 'Offline (Template)';
                els.gpuInfo.textContent = data.gpu || 'CPU';
                els.providerInfo.textContent = data.provider || 'Template Engine';
                
                let infoHtml = '';
                if (data.system) {
                    for (const [k, v] of Object.entries(data.system)) {
                        infoHtml += '<div class="info-row"><span>' + k + ':</span><span>' + v + '</span></div>';
                    }
                }
                els.systemInfo.innerHTML = infoHtml;
            } catch (e) {
                els.statusDot.className = 'status-dot offline';
                els.statusText.textContent = 'Offline (Template)';
            }
        }
        
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.mode = btn.dataset.mode;
            });
        });
        
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                els.promptInput.value = btn.dataset.action;
                sendMessage();
            });
        });
        
        els.sendBtn.addEventListener('click', sendMessage);
        
        els.promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        checkStatus();
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
